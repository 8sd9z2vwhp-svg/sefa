<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Earth App</title>

<link href="https://cesium.com/downloads/cesiumjs/releases/1.118/Build/Cesium/Widgets/widgets.css" rel="stylesheet">

<style>
html, body, #cesiumContainer {
  width: 100%;
  height: 100%;
  margin: 0;
  padding: 0;
  overflow: hidden;
  background: #000;
}

#topbar {
  position: absolute;
  top: 15px;
  left: 10px;
  right: 10px;
  z-index: 999;
  display: flex;
  gap: 8px;
}

#search {
  flex: 1;
  padding: 13px;
  border-radius: 10px;
  border: none;
  font-size: 16px;
}

button {
  padding: 13px;
  border: none;
  border-radius: 10px;
  background: #111;
  color: white;
  font-size: 16px;
}

#info {
  position: absolute;
  bottom: 15px;
  left: 10px;
  right: 10px;
  z-index: 999;
  background: rgba(0,0,0,.65);
  color: white;
  padding: 10px;
  border-radius: 10px;
  font-family: Arial;
  font-size: 13px;
}
</style>
</head>

<body>
<div id="cesiumContainer"></div>

<div id="topbar">
  <input id="search" placeholder="Şehir ara: Kayseri, İstanbul..." />
  <button onclick="searchPlace()">Ara</button>
  <button onclick="goMyLocation()">📍</button>
</div>

<div id="info">Parmakla döndür, iki parmakla yakınlaştır. Arama için şehir yaz.</div>

<script src="https://cesium.com/downloads/cesiumjs/releases/1.118/Build/Cesium/Cesium.js"></script>

<script>
Cesium.Ion.defaultAccessToken = "";

const viewer = new Cesium.Viewer("cesiumContainer", {
  animation: false,
  timeline: false,
  baseLayerPicker: false,
  geocoder: false,
  homeButton: true,
  sceneModePicker: false,
  navigationHelpButton: false,
  fullscreenButton: true,
  infoBox: false,
  selectionIndicator: false,
  imageryProvider: new Cesium.OpenStreetMapImageryProvider({
    url: "https://tile.openstreetmap.org/"
  })
});

viewer.scene.globe.enableLighting = true;
viewer.scene.globe.depthTestAgainstTerrain = false;

viewer.camera.flyTo({
  destination: Cesium.Cartesian3.fromDegrees(35.4787, 38.7205, 2500000)
});

const places = {
  "kayseri": [35.4787, 38.7205, 120000],
  "istanbul": [28.9784, 41.0082, 150000],
  "ankara": [32.8597, 39.9334, 150000],
  "izmir": [27.1428, 38.4237, 150000],
  "trabzon": [39.7168, 41.0027, 120000],
  "sivas": [37.0161, 39.7477, 120000],
  "erciyes": [35.5250, 38.5312, 60000]
};

function flyToLonLat(lon, lat, height) {
  viewer.camera.flyTo({
    destination: Cesium.Cartesian3.fromDegrees(lon, lat, height)
  });
}

function searchPlace() {
  const q = document.getElementById("search").value.trim().toLowerCase();

  if (places[q]) {
    const p = places[q];
    flyToLonLat(p[0], p[1], p[2]);
    document.getElementById("info").innerText = q + " konumuna gidildi.";
  } else {
    document.getElementById("info").innerText = "Konum listede yok. Şimdilik: kayseri, istanbul, ankara, izmir, trabzon, sivas, erciyes";
  }
}

function goMyLocation() {
  if (!navigator.geolocation) {
    alert("Konum desteklenmiyor.");
    return;
  }

  navigator.geolocation.getCurrentPosition(
    pos => {
      const lat = pos.coords.latitude;
      const lon = pos.coords.longitude;
      flyToLonLat(lon, lat, 50000);
      document.getElementById("info").innerText = "Mevcut konumuna gidildi.";
    },
    () => {
      alert("Konum izni verilmedi.");
    }
  );
}
</script>
</body>
</html>
